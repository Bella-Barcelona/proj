            <select id="Registered">
                <option value="yes">YES</option>
                <option value="no">NO</option>
            </select>
        </form>

        </form>

            <select id="Section">
                <option value="Emerald">Emerald</option>

             <select id="Grade">
                <option value="Grade7">7</option>

        </form>
    </form><br>
     <button class="btn" type="submit" py-click="PASS" style="display: block;  margin-left: 5.5%; background-color: #323838; color: #ffffff; font-family: Arvo; margin-left: auto; margin-right: auto;">GET</button> <br>
